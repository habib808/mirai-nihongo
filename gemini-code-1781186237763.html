<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>জাপানি শব্দভান্ডার — পাঠ ৫-১১</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f0e17;
  --surface: #1a1825;
  --surface2: #242233;
  --border: rgba(255,255,255,0.08);
  --text: #fffffe;
  --muted: #a7a9be;
  --hint: #6b6d80;

  --c1: #ff8906; /* amber */
  --c2: #f25f4c; /* coral */
  --c3: #e53170; /* pink */
  --c4: #3da9fc; /* blue */
  --c5: #43d9ad; /* teal */
  --c6: #a78bfa; /* purple */
  --c7: #fbbf24; /* yellow-orange */
  --c8: #f43f5e; /* rose */

  --cat-food: #ff8906;
  --cat-drink: #3da9fc;
  --cat-home: #43d9ad;
  --cat-adj: #a78bfa;
  --cat-verb: #f25f4c;
  --cat-phrase: #e53170;
  --cat-other: #94a3b8;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Noto Sans Bengali', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* BACKGROUND PATTERN */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 80% 50% at 20% 0%, rgba(61,169,252,0.07) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 80% 100%, rgba(229,49,112,0.07) 0%, transparent 60%);
  pointer-events: none;
  z-index: 0;
}

.app { position: relative; z-index: 1; max-width: 900px; margin: 0 auto; padding: 0 16px 80px; }

/* HEADER */
header {
  padding: 32px 0 24px;
  text-align: center;
}
.header-badge {
  display: inline-block;
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.15em;
  color: var(--c5);
  background: rgba(67,217,173,0.1);
  border: 1px solid rgba(67,217,173,0.2);
  padding: 4px 12px;
  border-radius: 100px;
  margin-bottom: 12px;
}
h1 {
  font-size: clamp(22px, 5vw, 34px);
  font-weight: 700;
  background: linear-gradient(135deg, var(--c1), var(--c3), var(--c4));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  line-height: 1.2;
  margin-bottom: 8px;
}
.subtitle { font-size: 13px; color: var(--muted); }

/* STATS BAR */
.stats-bar {
  display: flex;
  gap: 10px;
  margin: 20px 0;
  flex-wrap: wrap;
}
.stat {
  flex: 1;
  min-width: 80px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 10px;
  text-align: center;
}
.stat-num { font-size: 22px; font-weight: 700; font-family: 'Space Mono', monospace; }
.stat-lbl { font-size: 11px; color: var(--muted); margin-top: 2px; }
.stat.known .stat-num { color: var(--c5); }
.stat.again .stat-num { color: var(--c2); }
.stat.total .stat-num { color: var(--c4); }

/* LESSON + CATEGORY FILTERS */
.filter-row {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 10px;
}
.filter-btn {
  font-family: 'Noto Sans Bengali', sans-serif;
  font-size: 12px;
  padding: 6px 14px;
  border-radius: 100px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  transition: all 0.2s;
}
.filter-btn:hover { border-color: rgba(255,255,255,0.2); color: var(--text); }
.filter-btn.active {
  color: #000;
  border-color: transparent;
  font-weight: 600;
}
.filter-btn[data-lesson="all"].active { background: linear-gradient(135deg, var(--c1), var(--c3)); }
.filter-btn[data-lesson="5"].active { background: var(--c1); }
.filter-btn[data-lesson="6"].active { background: var(--c4); }
.filter-btn[data-lesson="7"].active { background: var(--c5); }
.filter-btn[data-lesson="8"].active { background: var(--c6); }
.filter-btn[data-lesson="10"].active { background: var(--c7); }
.filter-btn[data-lesson="11"].active { background: var(--c8); }

.cat-filter-row {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-bottom: 16px;
}
.cat-btn {
  font-family: 'Noto Sans Bengali', sans-serif;
  font-size: 12px; 
  padding: 6px 14px; 
  border-radius: 100px;
  border: 1px solid transparent;
  cursor: pointer;
  transition: all 0.2s;
  opacity: 0.8; 
}

.cat-btn:hover {
  opacity: 1;
  border-color: rgba(255, 255, 255, 0.2); 
}

.cat-btn.active {
  opacity: 1;
  font-weight: 600;
  border-color: currentColor; 
}

/* PROGRESS */
.progress-wrap { margin-bottom: 16px; }
.progress-info { display: flex; justify-content: space-between; font-size: 12px; color: var(--muted); margin-bottom: 6px; }
.progress-track {
  height: 4px;
  background: var(--surface2);
  border-radius: 2px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--c5), var(--c4));
  border-radius: 2px;
  transition: width 0.4s ease;
}

/* FLASHCARD */
.card-area {
  perspective: 1200px;
  margin-bottom: 16px;
}
.card-inner {
  position: relative;
  transform-style: preserve-3d;
  transition: transform 0.5s cubic-bezier(0.4,0,0.2,1);
  min-height: 340px;
  cursor: pointer;
}
.card-inner.flipped { transform: rotateY(180deg); }

.card-face {
  position: absolute;
  inset: 0;
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
  border-radius: 20px;
  padding: 28px 24px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  border: 1px solid var(--border);
  z-index: 2; 
}
.card-front {
  background: var(--surface);
}
.card-back {
  background: var(--surface2);
  transform: rotateY(180deg);
  justify-content: flex-start;
  overflow-y: auto;
}

/* CARD FRONT */
.card-lesson-badge {
  position: absolute;
  top: 16px;
  left: 16px;
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  padding: 3px 10px;
  border-radius: 100px;
  background: rgba(255,255,255,0.06);
  color: var(--muted);
}
.card-cat-badge {
  position: absolute;
  top: 16px;
  right: 16px;
  font-size: 10px;
  padding: 3px 10px;
  border-radius: 100px;
  font-weight: 600;
}
.card-jp {
  font-family: 'Noto Sans JP', sans-serif;
  font-size: clamp(32px, 6vw, 55px);
  font-weight: 700;
  margin-bottom: 8px;
  text-align: center;
  line-height: 1.2;
}
.card-reading {
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 16px;
  color: var(--muted);
  margin-bottom: 4px;
}
.card-romaji {
  font-family: 'Space Mono', monospace;
  font-size: 13px;
  color: var(--hint);
}
.tap-hint {
  position: absolute;
  bottom: 16px;
  font-size: 11px;
  color: var(--hint);
  display: flex;
  align-items: center;
  gap: 5px;
}
.tap-hint::before { content: '👆'; font-size: 14px; }

/* AUDIO BUTTON */
.audio-btn {
  position: absolute;
  bottom: 16px;
  right: 16px;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--c4);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  transition: all 0.2s;
  z-index: 10;
}
.audio-btn:hover { background: rgba(61,169,252,0.15); border-color: var(--c4); }

/* CARD BACK */
.back-header {
  width: 100%;
  display: flex;
  align-items: flex-start;
  gap: 12px;
  margin-bottom: 16px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--border);
}
.back-jp {
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 28px;
  font-weight: 700;
  line-height: 1.2;
}
.back-readings { flex: 1; }
.back-kana {
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 14px;
  color: var(--muted);
}
.back-romaji-text {
  font-family: 'Space Mono', monospace;
  font-size: 12px;
  color: var(--hint);
  margin-top: 2px;
}
.back-meaning {
  font-size: 22px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 14px;
  width: 100%;
}

.section {
  width: 100%;
  margin-bottom: 14px;
  border-radius: 12px;
  padding: 12px 14px;
}
.section-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin-bottom: 6px;
  display: flex;
  align-items: center;
  gap: 5px;
}
.section-content { font-size: 13px; line-height: 1.65; }
.section-content em {
  font-style: normal;
  font-weight: 700;
  text-decoration: underline;
  text-decoration-style: dotted;
  text-underline-offset: 3px;
}

.trick-section { background: rgba(255,137,6,0.08); border: 1px solid rgba(255,137,6,0.15); }
.trick-section .section-label { color: var(--c1); }
.trick-section .section-content { color: #ffd6a5; }

.example-section { background: rgba(61,169,252,0.08); border: 1px solid rgba(61,169,252,0.15); }
.example-section .section-label { color: var(--c4); }
.example-jp { font-family: 'Noto Sans JP', sans-serif; font-size: 15px; color: var(--text); margin-bottom: 4px; }
.example-bn { font-size: 13px; color: var(--muted); }

.back-audio-btn {
  width: 100%;
  padding: 10px;
  border-radius: 10px;
  border: 1px solid rgba(61,169,252,0.25);
  background: rgba(61,169,252,0.08);
  color: var(--c4);
  cursor: pointer;
  font-family: 'Noto Sans Bengali', sans-serif;
  font-size: 13px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  transition: all 0.2s;
  margin-bottom: 14px;
}
.back-audio-btn:hover { background: rgba(61,169,252,0.15); }

/* KNOW BUTTONS */
.know-row {
  display: flex;
  gap: 10px;
  margin-bottom: 12px;
}
.know-btn {
  flex: 1;
  padding: 12px;
  border-radius: 12px;
  border: 1px solid transparent;
  font-family: 'Noto Sans Bengali', sans-serif;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}
.btn-again {
  background: rgba(242,95,76,0.1);
  border-color: rgba(242,95,76,0.3);
  color: var(--c2);
}
.btn-again:hover { background: rgba(242,95,76,0.2); }
.btn-know {
  background: rgba(67,217,173,0.1);
  border-color: rgba(67,217,173,0.3);
  color: var(--c5);
}
.btn-know:hover { background: rgba(67,217,173,0.2); }

/* NAV CONTROLS */
.nav-row {
  display: flex;
  gap: 10px;
  align-items: center;
}
.nav-btn {
  flex: 1;
  padding: 11px;
  border-radius: 12px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--muted);
  font-family: 'Noto Sans Bengali', sans-serif;
  font-size: 13px;
  cursor: pointer;
  transition: all 0.2s;
}
.nav-btn:hover { border-color: rgba(255,255,255,0.2); color: var(--text); }
.shuffle-btn {
  padding: 11px 20px;
  border-radius: 12px;
  border: 1px solid rgba(167,139,250,0.3);
  background: rgba(167,139,250,0.08);
  color: var(--c6);
  font-family: 'Noto Sans Bengali', sans-serif;
  font-size: 13px;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 6px;
}
.shuffle-btn:hover { background: rgba(167,139,250,0.15); }

/* COMPLETION */
.completion {
  display: none;
  text-align: center;
  padding: 40px 20px;
  background: var(--surface);
  border-radius: 20px;
  border: 1px solid var(--border);
  margin-bottom: 16px;
}
.completion.show { display: block; }
.completion h2 { font-size: 28px; margin-bottom: 8px; }
.completion p { color: var(--muted); margin-bottom: 20px; }
.restart-btn {
  padding: 12px 28px;
  border-radius: 12px;
  border: none;
  background: linear-gradient(135deg, var(--c5), var(--c4));
  color: #000;
  font-family: 'Noto Sans Bengali', sans-serif;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  transition: opacity 0.2s;
}
.restart-btn:hover { opacity: 0.85; }

/* KEYBOARD HINT */
.keyboard-hint {
  text-align: center;
  font-size: 11px;
  color: var(--hint);
  margin-top: 12px;
}
kbd {
  font-family: 'Space Mono', monospace;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 1px 6px;
  font-size: 10px;
}

/* SITE FOOTER */
.site-footer {
  text-align: center;
  padding: 24px 0 8px;
  font-family: 'Space Mono', monospace;
  font-size: 13px;
  color: var(--hint);
  border-top: 1px solid var(--border);
  margin-top: 40px;
  letter-spacing: 0.05em;
}

.site-footer span {
  color: var(--c5); 
  font-weight: 700;
}
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="header-badge">জাপানি ভাষা শিক্ষা</div>
    <h1>শব্দভান্ডার অনুশীলন</h1>
    <p class="subtitle">পাঠ ৫–১১ • মনে রাখার কৌশলসহ ফ্ল্যাশকার্ড</p>
  </header>

  <div class="stats-bar">
    <div class="stat total"><div class="stat-num" id="totalStat">0</div><div class="stat-lbl">মোট</div></div>
    <div class="stat known"><div class="stat-num" id="knownStat">0</div><div class="stat-lbl">জানি ✓</div></div>
    <div class="stat again"><div class="stat-num" id="againStat">0</div><div class="stat-lbl">আবার দেখাও</div></div>
  </div>

  <div class="filter-row" id="lessonFilters"></div>
  <div class="cat-filter-row" id="catFilters"></div>

  <div class="progress-wrap">
    <div class="progress-info">
      <span id="progLabel">কার্ড ১ / ১</span>
      <span id="progPct">0%</span>
    </div>
    <div class="progress-track"><div class="progress-fill" id="progFill" style="width:0%"></div></div>
  </div>

  <div class="card-area" id="cardArea">
    <div class="card-inner" id="cardInner">
      <!-- FRONT -->
      <div class="card-face card-front" id="cardFront">
        <span class="card-lesson-badge" id="cLesson"></span>
        <span class="card-cat-badge" id="cCat"></span>
        <div class="card-jp" id="cJp"></div>
        <div class="card-reading" id="cKana"></div>
        <div class="card-romaji" id="cRomaji"></div>
        <span class="tap-hint">ট্যাপ করুন মানে দেখতে</span>
        <button class="audio-btn" id="audioFront" title="উচ্চারণ শুনুন">🔊</button>
      </div>
      <!-- BACK -->
      <div class="card-face card-back" id="cardBack">
        <div class="back-header">
          <div class="back-jp" id="bJp"></div>
          <div class="back-readings">
            <div class="back-kana" id="bKana"></div>
            <div class="back-romaji-text" id="bRomaji"></div>
          </div>
        </div>
        <div class="back-meaning" id="bMeaning"></div>
        <button class="back-audio-btn" id="audioBack">🔊 উচ্চারণ শুনুন</button>
        <div class="section trick-section">
          <div class="section-label">💡 মনে রাখার কৌশল</div>
          <div class="section-content" id="bTrick"></div>
        </div>
        <div class="section example-section">
          <div class="section-label">📝 উদাহরণ বাক্য</div>
          <div class="example-jp" id="bExJp"></div>
          <div class="example-bn" id="bExBn"></div>
        </div>
        <div class="know-row">
          <button class="know-btn btn-again" onclick="markCard(false)">↩ আবার দেখাও</button>
          <button class="know-btn btn-know" onclick="markCard(true)">জানি ✓</button>
        </div>
      </div>
    </div>
  </div>

  <div class="completion" id="completion">
    <h2>🎉 শেষ!</h2>
    <p id="completionMsg"></p>
    <button class="restart-btn" onclick="restart()">আবার শুরু করুন</button>
  </div>

  <div class="nav-row">
    <button class="nav-btn" onclick="prevCard()">← আগে</button>
    <button class="shuffle-btn" onclick="shuffle()">🔀 শাফল</button>
    <button class="nav-btn" onclick="nextCard()">পরে →</button>
  </div>

  <div class="keyboard-hint">
    কীবোর্ড: <kbd>Space</kbd> উল্টান • <kbd>→</kbd> পরে • <kbd>←</kbd> আগে • <kbd>K</kbd> জানি • <kbd>A</kbd> আবার • <kbd>S</kbd> শব্দ
  </div>
  <footer class="site-footer">
    Developed by <span>Habib</span>
  </footer>
</div>

<script>
const CAT_COLORS = {
  food:'#ff8906', drink:'#3da9fc', home:'#43d9ad',
  adj:'#a78bfa', verb:'#f25f4c', phrase:'#e53170', other:'#94a3b8'
};
const CAT_BG = {
  food:'rgba(255,137,6,0.12)', drink:'rgba(61,169,252,0.12)', home:'rgba(67,217,173,0.12)',
  adj:'rgba(167,139,250,0.12)', verb:'rgba(242,95,76,0.12)', phrase:'rgba(229,49,112,0.12)', other:'rgba(148,163,184,0.12)'
};
const CAT_LABELS = {
  food:'খাবার', drink:'পানীয়', home:'ঘর/অফিস', adj:'বিশেষণ', verb:'ক্রিয়া', phrase:'বাক্যাংশ', other:'অন্যান্য'
};
const LESSON_COLORS = {'5':'#ff8906','6':'#3da9fc','7':'#43d9ad','8':'#a78bfa','10':'#fbbf24','11':'#f43f5e'};

const WORDS = [
  // =========== LESSON 5 ===========
  {l:'5',jp:'朝ご飯',kana:'あさごはん',rom:'asagohan',bn:'সকালের নাস্তা',cat:'food',
   trick:'<em>আসা</em> = সকাল। সকালে দিন আসে, সাথে নাস্তাও আসে!',
   exJp:'毎朝、朝ご飯を食べます。',exBn:'প্রতিদিন সকালে নাস্তা খাই।'},
  {l:'5',jp:'うどん',kana:'うどん',rom:'udon',bn:'উডন (মোটা গমের নুডলস)',cat:'food',
   trick:'<em>উডন</em> — "ওডন" মানে বাংলায় মোটা। উডন নুডলসও মোটা!',
   exJp:'うどんが好きです。',exBn:'আমি উডন পছন্দ করি।'},
  {l:'5',jp:'梅干し',kana:'うめぼし',rom:'umeboshi',bn:'উমেবোশি (টক-নোনা আচার)',cat:'food',
   trick:'<em>উমে</em> = বরই + <em>বোশি</em> = শুকানো। শুকানো বরইয়ের আচার!',
   exJp:'梅干しはすっぱいです。',exBn:'উমেবোশি টক।'},
  {l:'5',jp:'お酒',kana:'おさけ',rom:'osake',bn:'অ্যালকোহল',cat:'drink',
   trick:'<em>সাকে</em> নামটা বিখ্যাত — জাপানি ভাতের মদ "sake"। sake = মদ!',
   exJp:'お酒は飲みません。',exBn:'আমি মদ পান করি না。'},

   trick:'<em>ইরাই</em> -> "হিরো" এর মতো দারুণ কাজ করেছ, তাই প্রশংসনীয়!',

];

const lessonColors = {'5':'#ff8906','6':'#3da9fc','7':'#43d9ad','8':'#a78bfa','10':'#fbbf24','11':'#f43f5e'};
const catLabels = {food:'খাবার 🍱',drink:'পানীয় 🥤',home:'ঘর/অফিস 🏠',adj:'বিশেষণ ✨',verb:'ক্রিয়া ⚡',phrase:'বাক্যাংশ 💬',other:'অন্যান্য 📦'};

let deck=[],idx=0,flipped=false,known=0,again=0;
let filterLesson='all',filterCat='all';

function buildFilters(){
  const lf=document.getElementById('lessonFilters');
  lf.innerHTML='';
  ['all','5','6','7','8','10','11'].forEach(l=>{
    const b=document.createElement('button');
    b.className='filter-btn'+(l===filterLesson?' active':'');
    b.dataset.lesson=l;
    b.textContent=l==='all'?'সব পাঠ':'পাঠ '+l;
    if(l!=='all') b.style.setProperty('--lc',lessonColors[l]);
    b.onclick=()=>{filterLesson=l;buildFilters();buildCatFilters();load();};
    lf.appendChild(b);
  });
}

function buildCatFilters(){
  const cf=document.getElementById('catFilters');
  cf.innerHTML='';
  const btn0=document.createElement('button');
  btn0.className='cat-btn'+(filterCat==='all'?' active':'');
  btn0.textContent='সব';
  btn0.style.background='rgba(255,255,255,0.08)';
  btn0.style.color='#fff';
  btn0.style.borderColor='rgba(255,255,255,0.15)';
  btn0.onclick=()=>{filterCat='all';buildCatFilters();load();};
  cf.appendChild(btn0);
  const cats=new Set(WORDS.filter(w=>filterLesson==='all'||w.l===filterLesson).map(w=>w.cat));
  cats.forEach(c=>{
    const b=document.createElement('button');
    b.className='cat-btn'+(c===filterCat?' active':'');
    b.textContent=catLabels[c]||c;
    b.style.background=CAT_BG[c]||'rgba(148,163,184,0.1)';
    b.style.color=CAT_COLORS[c]||'#94a3b8';
    b.style.borderColor=(CAT_COLORS[c]||'#94a3b8')+'44';
    b.onclick=()=>{filterCat=c;buildCatFilters();load();};
    cf.appendChild(b);
  });
}

function load(){
  deck=WORDS.filter(w=>{
    const lOk=filterLesson==='all'||w.l===filterLesson;
    const cOk=filterCat==='all'||w.cat===filterCat;
    return lOk&&cOk;
  });
  idx=0;known=0;again=0;
  updateStats();
  document.getElementById('completion').classList.remove('show');
  document.getElementById('cardArea').style.display='block';
  showCard();
}

function showCard(){
  if(deck.length===0) {
    document.getElementById('cJp').textContent="কোনো কার্ড নেই";
    document.getElementById('cKana').textContent="";
    document.getElementById('cRomaji').textContent="";
    return;
  }
  flipped=false;
  document.getElementById('cardInner').classList.remove('flipped');
  const w=deck[idx];
  // FRONT
  document.getElementById('cLesson').textContent='পাঠ '+w.l;
  document.getElementById('cLesson').style.borderColor=lessonColors[w.l]+'44';
  document.getElementById('cLesson').style.color=lessonColors[w.l];
  const catEl=document.getElementById('cCat');
  catEl.textContent=catLabels[w.cat]||w.cat;
  catEl.style.background=CAT_BG[w.cat];
  catEl.style.color=CAT_COLORS[w.cat];
  document.getElementById('cJp').textContent=w.jp;
  document.getElementById('cJp').style.color=lessonColors[w.l];
  document.getElementById('cKana').textContent=w.kana;
  document.getElementById('cRomaji').textContent=w.rom;
  // BACK
  document.getElementById('bJp').textContent=w.jp;
  document.getElementById('bJp').style.color=lessonColors[w.l];
  document.getElementById('bKana').textContent=w.kana;
  document.getElementById('bRomaji').textContent=w.rom;
  document.getElementById('bMeaning').textContent=w.bn;
  document.getElementById('bTrick').innerHTML=w.trick || "কোনো ট্রিকস যুক্ত করা হয়নি।";
  document.getElementById('bExJp').textContent=w.exJp || "";
  document.getElementById('bExBn').textContent=w.exBn || "";
  // Progress
  const pct=Math.round((idx+1)/deck.length*100);
  document.getElementById('progFill').style.width=pct+'%';
  document.getElementById('progLabel').textContent='কার্ড '+(idx+1)+' / '+deck.length;
  document.getElementById('progPct').textContent=pct+'%';
  document.getElementById('totalStat').textContent=deck.length;
}

function flipCard(){
  if(deck.length===0)return;
  flipped=!flipped;
  document.getElementById('cardInner').classList.toggle('flipped',flipped);
}

document.getElementById('cardInner').onclick=()=>{if(!flipped)flipCard();};

function markCard(isKnown){
  if(!flipped)return;
  if(isKnown)known++;else again++;
  updateStats();
  nextCard();
}

function updateStats(){
  document.getElementById('knownStat').textContent=known;
  document.getElementById('againStat').textContent=again;
  document.getElementById('totalStat').textContent=deck.length;
}

function nextCard(){
  if(idx<deck.length-1){idx++;showCard();}
  else{showCompletion();}
}

function prevCard(){
  if(idx>0){idx--;flipped=false;document.getElementById('cardInner').classList.remove('flipped');showCard();}
}

function showCompletion(){
  document.getElementById('cardArea').style.display='none';
  const c=document.getElementById('completion');
  c.classList.add('show');
  const pct=Math.round(known/deck.length*100);
  document.getElementById('completionMsg').textContent=
    `${deck.length}টি কার্ডের মধ্যে ${known}টি জানেন (${pct}%)। অসাধারণ!`;
}

function restart(){
  document.getElementById('completion').classList.remove('show');
  document.getElementById('cardArea').style.display='block';
  load();
}

function shuffle(){
  for(let i=deck.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[deck[i],deck[j]]=[deck[j],deck[i]];}
  idx=0;known=0;again=0;updateStats();showCard();
}

// AUDIO via Web Speech API
function speak(text){
  if(!window.speechSynthesis)return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang='ja-JP';
  u.rate=0.85;
  u.pitch=1;
  window.speechSynthesis.speak(u);
}
document.getElementById('audioFront').onclick=(e)=>{e.stopPropagation();if(deck.length)speak(deck[idx].jp);};
document.getElementById('audioBack').onclick=()=>{if(deck.length)speak(deck[idx].jp);};

// KEYBOARD
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT')return;
  if(e.code==='Space'||e.key===' '){e.preventDefault();flipCard();}
  else if(e.code==='ArrowRight')nextCard();
  else if(e.code==='ArrowLeft')prevCard();
  else if(e.key==='k'||e.key==='K') markCard(true);
  else if(e.key==='a'||e.key==='A') markCard(false);
  else if(e.key==='s'||e.key==='S'){if(deck.length)speak(deck[idx].jp);}
});

// SWIPE
let touchX=null;
document.getElementById('cardInner').addEventListener('touchstart',e=>{touchX=e.touches[0].clientX;},{passive:true});
document.getElementById('cardInner').addEventListener('touchend',e=>{
  if(touchX===null)return;
  const dx=e.changedTouches[0].clientX-touchX;
  if(Math.abs(dx)>60){if(dx<0)nextCard();else prevCard();}
  touchX=null;
});

// INIT
buildFilters();
buildCatFilters();
load();
</script>
</body>
